[server]
listen = "127.0.0.1:13306"
default_strategy = "content"

[backends]
  [backends.npu]
  type = "openai"
  base_url = "http://127.0.0.1:52625"
  models = ["qwen3:0.6b", "qwen3:1.7b", "gemma3:1b"]
  speed_tok_s = 64

  [backends.gpu]
  type = "openai"
  base_url = "http://127.0.0.1:13305"
  models = ["qwen3-0.6b-FLM", "Bonsai-1.7B-gguf"]
  speed_tok_s = 56

  [backends.final]
  type = "openai"
  base_url = "http://127.0.0.1:52627"
  models = ["qwen3:0.6b"]
  speed_tok_s = 43

[strategies]
  [strategies.passthrough]
  type = "passthrough"
  backend = "npu"

  [strategies.cascade]
  type = "cascade"
  small_backend = "final"
  large_backend = "gpu"
  confidence_threshold = -3.0
  min_context_for_large = 50

  [strategies.content]
  type = "content_router"
  small_backend = "npu"
  large_backend = "gpu"
  gpu_keywords = ["code", "explain", "analyze", "debug", "refactor"]
  max_small_tokens = 2000
