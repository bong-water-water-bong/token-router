[server]
listen = "127.0.0.1:13306"
log_level = "info"
default_strategy = "passthrough"

[backends]

  [backends.npu]
  type = "openai"
  base_url = "http://127.0.0.1:52628/v1"
  models = ["qwen3-0.6b-FLM"]
  speed_tok_s = 291
  cost_per_token = 0.1

  [backends.gpu]
  type = "openai"
  base_url = "http://127.0.0.1:13305/v1"
  models = ["bonsai-1.7b", "bitnet"]
  speed_tok_s = 113
  cost_per_token = 1.0

[strategies]

  [strategies.passthrough]
  type = "passthrough"
  backend = "gpu"

  [strategies.cascade]
  type = "cascade"
  small_backend = "npu"
  large_backend = "gpu"
  confidence_threshold = -2.5
  min_context_for_large = 50

  [strategies.content]
  type = "content_router"
  fallback_large_backend = "gpu"
  gpu_keywords = [
    "code", "explain", "analyze", "debug", "refactor",
    "implement", "function", "algorithm", "architecture",
    "write", "fix", "review", "optimize", "design", "test"
  ]
  max_small_tokens = 2000
